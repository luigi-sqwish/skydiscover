# Math benchmark: hexagon_packing/12
# Usage: skydiscover-run initial_program.py evaluator.py -c config.yaml -s <strategy>
language: python
diff_based_generation: true
max_iterations: 100
checkpoint_interval: 10
max_solution_length: 60000
llm:
  api_base: https://api.openai.com/v1
  models:
    - name: "gpt-5"
      weight: 1.0
  max_tokens: 32000
  timeout: 600
prompt:
  system_message: You are an expert mathematician and programmer specializing in numerical optimization and mathematical discovery.
    Your task is to evolve the solution for the hexagon_packing/12 problem from AlphaEvolve. Focus on finding optimal numerical
    solutions that maximize the evaluation metric.
evaluator:
  timeout: 600
  max_retries: 3
